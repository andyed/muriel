<text x="134.0" y="206.0" fill="#7dd4e4" font-size="15" font-weight="600" letter-spacing="0.06em" text-transform="uppercase">OPTIMIZER</text>
<text x="134.0" y="234.0" fill="#e6e4d2" font-size="13">• Long, focused dwells</text>
<text x="134.0" y="256.0" fill="#e6e4d2" font-size="13">• Targeted re-reads</text>
<text x="134.0" y="278.0" fill="#e6e4d2" font-size="13">• Cognitive load rises with rank</text>
<text x="468.0" y="206.0" fill="#7dd4e4" font-size="15" font-weight="600" letter-spacing="0.06em" text-transform="uppercase">OPTIMIZER + LOAD</text>
<text x="468.0" y="234.0" fill="#e6e4d2" font-size="13">• Position 1-3 of dense SERP</text>
<text x="468.0" y="256.0" fill="#e6e4d2" font-size="13">• Sustained pupil dilation</text>
<text x="468.0" y="278.0" fill="#e6e4d2" font-size="13">• Slow click latency</text>
<text x="134.0" y="410.0" fill="#7dd4e4" font-size="15" font-weight="600" letter-spacing="0.06em" text-transform="uppercase">SATISFICER</text>
<text x="134.0" y="438.0" fill="#e6e4d2" font-size="13">• Quick scans</text>
<text x="134.0" y="460.0" fill="#e6e4d2" font-size="13">• Early commitments</text>
<text x="134.0" y="482.0" fill="#e6e4d2" font-size="13">• Low pupil reactivity</text>
<text x="468.0" y="410.0" fill="#7dd4e4" font-size="15" font-weight="600" letter-spacing="0.06em" text-transform="uppercase">SATISFICER + LOAD</text>
<text x="468.0" y="438.0" fill="#e6e4d2" font-size="13">• Conflict signals</text>
<text x="468.0" y="460.0" fill="#e6e4d2" font-size="13">• Re-reads without resolution</text>
<text x="468.0" y="482.0" fill="#e6e4d2" font-size="13">• Premature exit</text>
