<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" role="img" aria-label="Scrutinizer foveation explainer — only two degrees of your visual field is sharp">
<defs>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap');
.bg      { fill: #0f172a; }
.hero    { fill: #ffffff;      font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; letter-spacing: -0.02em; }
.stat    { fill: #c7d2fe; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 900; letter-spacing: -0.04em; }
.eyebrow { fill: #c7d2fe; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; }
.section { fill: #ffffff;      font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; letter-spacing: -0.01em; }
.body    { fill: #e2e8f0;  font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; }
.label   { fill: #e2e8f0;  font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; }
.muted   { fill: #cbd5e1;  font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; }
.foot    { fill: #cbd5e1;  font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; letter-spacing: 0.02em; }
.url     { fill: #c7d2fe; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; }
</style>
<!-- Generous filter regions so blur has headroom around small elements (dots)
     as well as big ones (thumbnails). 300% on all sides of bbox gives 100% bleed. -->
<filter id="blur5"  x="-100%" y="-100%" width="300%" height="300%">
  <feGaussianBlur stdDeviation="2.0"/>
  <feColorMatrix type="saturate" values="0.85"/>
</filter>
<filter id="blur15" x="-100%" y="-100%" width="300%" height="300%">
  <feGaussianBlur stdDeviation="6.0"/>
  <feColorMatrix type="saturate" values="0.55"/>
</filter>
<filter id="blur30" x="-100%" y="-100%" width="300%" height="300%">
  <feGaussianBlur stdDeviation="14.0"/>
  <feColorMatrix type="saturate" values="0.25"/>
</filter>
<!-- Dot-specific filters with tighter blur scales so the markers don't vanish
     entirely but visibly degrade. Progressive to match eccentricity. -->
<filter id="dot5"  x="-200%" y="-200%" width="500%" height="500%">
  <feGaussianBlur stdDeviation="0.8"/>
  <feColorMatrix type="saturate" values="0.85"/>
</filter>
<filter id="dot15" x="-200%" y="-200%" width="500%" height="500%">
  <feGaussianBlur stdDeviation="2.2"/>
  <feColorMatrix type="saturate" values="0.55"/>
</filter>
<filter id="dot30" x="-200%" y="-200%" width="500%" height="500%">
  <feGaussianBlur stdDeviation="4.5"/>
  <feColorMatrix type="saturate" values="0.25"/>
</filter>
<radialGradient id="eyeBall" cx="50%" cy="45%" r="50%">
  <stop offset="0%"   stop-color="#334155"/>
  <stop offset="75%"  stop-color="#1e293b"/>
  <stop offset="100%" stop-color="#0f172a"/>
</radialGradient>
</defs>
<rect class="bg" width="1080" height="1920"/>
<text x="72.0" y="76.0" class="eyebrow" font-size="28" text-anchor="start">SCRUTINIZER</text>
<text x="72.0" y="156.0" class="hero" font-size="68" text-anchor="start">Your vision</text>
<text x="72.0" y="220.0" class="hero" font-size="68" text-anchor="start">is mostly</text>
<text x="72.0" y="284.0" class="hero" font-size="68" text-anchor="start">peripheral.</text>
<text x="72.0" y="342.0" class="label" font-size="30" text-anchor="start">Scrutinizer shows you what users actually see —</text>
<text x="72.0" y="378.0" class="label" font-size="30" text-anchor="start">so you can design for it.</text>
<text x="1008.0" y="200.0" class="stat" font-size="120" text-anchor="end">2°</text>
<text x="1008.0" y="240.0" class="label" font-size="32" text-anchor="end">is sharp.</text>
<text x="1008.0" y="272.0" class="muted" font-size="22" text-anchor="end">The rest is inferred.</text>
<text x="72.0" y="432.0" class="eyebrow" font-size="22" text-anchor="start">WHERE SHARPNESS LIVES</text>
<text x="72.0" y="486.0" class="section" font-size="36" text-anchor="start">Half your cortex processes the central 2°.</text>
<circle cx="540" cy="685" r="150" fill="url(#eyeBall)" stroke="#334155" stroke-width="2"/>
<path d="M 684 639 C 720 661, 720 709, 684 731 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>
