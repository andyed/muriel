<circle cx="204" cy="685" r="3" fill="#c7d2fe"/>
<text x="92.0" y="671.0" class="eyebrow" font-size="22" text-anchor="start">FOVEA</text>
<text x="92.0" y="719.0" class="label" font-size="28" text-anchor="start">~2° wide.</text>
<text x="92.0" y="749.0" class="body" font-size="22" text-anchor="start">Sharp vision</text>
<text x="92.0" y="775.0" class="body" font-size="22" text-anchor="start">happens here.</text>
<line x1="694" y1="685" x2="856" y2="685" stroke="#22d3ee" stroke-width="1.5"/>
<circle cx="862" cy="685" r="3" fill="#22d3ee"/>
<circle cx="690" cy="685" r="3" fill="#22d3ee"/>
<text x="988.0" y="671.0" class="eyebrow" font-size="22" text-anchor="end">PERIPHERY</text>
<text x="988.0" y="719.0" class="label" font-size="28" text-anchor="end">~200° wide.</text>
<text x="988.0" y="749.0" class="body" font-size="22" text-anchor="end">Blurred, desaturated,</text>
<text x="988.0" y="775.0" class="body" font-size="22" text-anchor="end">crowded — inferred.</text>
<text x="72.0" y="912.0" class="eyebrow" font-size="22" text-anchor="start">ACUITY FALLS OFF FAST</text>
<text x="72.0" y="966.0" class="section" font-size="36" text-anchor="start">At 15° off-center, you see ~3× less detail.</text>
